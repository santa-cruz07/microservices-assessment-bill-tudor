name: Docker Build

on:
  push:
    tags:
      - "*-RC"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - order-module
          - notification-module

    steps:
      - name: Check Out Repo
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract tag name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Install Module Dependencies
        run: mvn -B -pl ${{ matrix.module }} -am install -DskipTests

      - name: Build and Push Docker Image
        run: >
          mvn -B -pl ${{ matrix.module }}
          jib:build
          -DskipTests
          -Djib.to.image=r11dev/bill-tudor-microservices-assessment
          -Djib.to.tags=${{ matrix.module }}-latest,${{ matrix.module }}-${{ env.TAG_NAME }}
          -Djib.to.auth.username=${{ secrets.DOCKERHUB_USERNAME }}
          -Djib.to.auth.password=${{ secrets.DOCKERHUB_PASSWORD }}
